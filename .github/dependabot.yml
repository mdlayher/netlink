version: 2
updates:
  - package-ecosystem: "gomod"
    directories:
      - "/"
      - "/internal/integration"
    schedule:
      interval: "monthly"
    groups:
      golang-x:
        patterns:
          - "golang.org/x/*"
        group-by: dependency-name
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
